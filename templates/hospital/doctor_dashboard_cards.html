{% load static %}

<style media="screen">
  .market-update-block {
    padding: 2em 2em;
    background: #999;
  }
  .market-update-block h3 {
    color: #fff;
    font-size: 2.5em;
    font-family: 'Carrois Gothic', sans-serif;
  }
  .market-update-block h4 {
    font-size: 1.2em;
    color: #fff;
    margin: 0.3em 0em;
    font-family: 'Carrois Gothic', sans-serif;
  }
  .market-update-block p {
    color: #fff;
    font-size: 0.8em;
    line-height: 1.8em;
  }
  .market-update-block.clr-block-1 {
    background: #ff0000;
    margin-right: 0.8em;
    box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.16), 0 2px 10px 0 rgba(0, 0, 0, 0.12);
    transition: 0.5s all;
  }
  .market-update-block.clr-block-2 {
    background: #FC8213;
    margin-right: 0.8em;
    box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.16), 0 2px 10px 0 rgba(0, 0, 0, 0.12);
    transition: 0.5s all;
  }
  .market-update-block.clr-block-3 {
    background: #1355f9;
    box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.16), 0 2px 10px 0 rgba(0, 0, 0, 0.12);
    transition: 0.5s all;
  }
  .market-update-block.clr-block-1:hover,
  .market-update-block.clr-block-2:hover,
  .market-update-block.clr-block-3:hover {
    background: #3C3C3C;
  }
  .market-update-right i.fa {
    font-size: 3em;
    width: 80px;
    height: 80px;
    background: #fff;
    text-align: center;
    border-radius: 49px;
    line-height: 1.7em;
  }
  .market-update-right i.fa-user-o { color: #68AE00; }
  .market-update-right i.fa-check-circle-o { color: #FC8213; }
  .market-update-right i.fa-calendar { color: #337AB7; }
  .market-update-left { padding: 0px; }

  /* 响应式：小屏幕时取消右边距 */
  @media (max-width: 768px) {
    .market-update-block.clr-block-1,
    .market-update-block.clr-block-2 {
      margin-right: 0;
      margin-bottom: 1em;
    }
  }
</style>

<div class="container-fluid" style="margin-top: 20px;">
  <div class="row">
    <div class="col-md-4">
      <div class="market-update-block clr-block-1">
        <div class="row">
          <div class="col-8 market-update-left">
            <h3>{{appointmentcount}}</h3>
            <h4>Appointments For You</h4>
          </div>
          <div class="col-4 market-update-right">
            <i class="fa fa-calendar"></i>
          </div>
        </div>
        <div class="clearfix"></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="market-update-block clr-block-2">
        <div class="row">
          <div class="col-8 market-update-left">
            <h3>{{patientcount}}</h3>
            <h4>Patient Under You</h4>
          </div>
          <div class="col-4 market-update-right">
            <i class="fa fa-user-o"></i>
          </div>
        </div>
        <div class="clearfix"></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="market-update-block clr-block-3">
        <div class="row">
          <div class="col-8 market-update-left">
            <h3>{{patientdischarged}}</h3>
            <h4>Your Patient Discharged</h4>
          </div>
          <div class="col-4 market-update-right">
            <i class="fa fa-check-circle-o"></i>
          </div>
        </div>
        <div class="clearfix"></div>
      </div>
    </div>
  </div>
</div>
